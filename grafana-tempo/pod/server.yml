apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-conf
data:
  configuration: |
    server:
      http_listen_port: 3200
      log_level: debug

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    metrics_generator:
      storage:
        path: /var/tempo/generator/wal

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks

    usage_report:
      reporting_enabled: false
---
apiVersion: v1
kind : Pod
metadata:
  name: tracing
spec:
  containers:
    - name: web
      image: docker.io/grafana/grafana:12.4.0-20629732093
      ports:
        - containerPort: 3000
          hostPort: 3000
          protocol: tcp
      volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana:Z

    - name: db
      image: docker.io/grafana/tempo:2.10.1
      ports:
        - containerPort: 3200
          hostPort: 3200
          protocol: tcp
        - containerPort: 4317
          hostPort: 4317
          protocol: tcp
        - containerPort: 4318
          hostPort: 4318
          protocol: tcp
      volumeMounts:
        - name: tempo-config
          mountPath: /mnt/config/tempo-config.yaml
          subPath: configuration
        - name: tempo-data
          mountPath: /var/tempo:Z
      args:
        - -target=all
        - -config.file=/mnt/config/tempo-config.yaml

  volumes:
    - name: grafana-data
      hostPath:
        path: ${HOST_PATH}/grafana

    - name: tempo-config
      configMap:
        name: tempo-conf

    - name: tempo-data
      hostPath:
        path: ${HOST_PATH}/tempo
